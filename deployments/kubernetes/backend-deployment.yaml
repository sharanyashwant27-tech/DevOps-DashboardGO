apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcc-backend
  namespace: devops-command-center
  labels:
    app: dcc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dcc-backend
  template:
    metadata:
      labels:
        app: dcc-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dcc-backend
      containers:
        - name: backend
          image: ghcr.io/devops-command-center/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DCC_CONFIG
              value: /app/config/config.yaml
            - name: DCC_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: dcc-secrets
                  key: database_host
            - name: DCC_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dcc-secrets
                  key: database_password
            - name: DCC_JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: dcc-secrets
                  key: jwt_access
            - name: DCC_JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dcc-secrets
                  key: jwt_refresh
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: dcc-config
---
apiVersion: v1
kind: Service
metadata:
  name: dcc-backend
  namespace: devops-command-center
spec:
  selector:
    app: dcc-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dcc-backend
  namespace: devops-command-center
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dcc-backend-reader
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources: ["pods", "pods/log", "namespaces", "nodes", "services", "events", "persistentvolumes", "persistentvolumeclaims", "deployments", "replicasets", "daemonsets", "ingresses"]
    verbs: ["get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dcc-backend-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dcc-backend-reader
subjects:
  - kind: ServiceAccount
    name: dcc-backend
    namespace: devops-command-center
