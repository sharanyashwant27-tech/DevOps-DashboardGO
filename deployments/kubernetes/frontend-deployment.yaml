apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcc-frontend
  namespace: devops-command-center
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dcc-frontend
  template:
    metadata:
      labels:
        app: dcc-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/devops-command-center/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dcc-frontend
  namespace: devops-command-center
spec:
  selector:
    app: dcc-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dcc-ingress
  namespace: devops-command-center
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: devops.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: dcc-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: dcc-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dcc-frontend
                port:
                  number: 80
