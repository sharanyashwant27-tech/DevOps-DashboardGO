services:
  postgres:
    image: postgres:16-alpine
    container_name: dcc-postgres
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_secret
      POSTGRES_DB: devops_command_center
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_command_center"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dcc-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: devops-dashboard-go:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile.backend
    container_name: dcc-backend
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DCC_CONFIG: /app/config/config.yaml
      DCC_FRONTEND_DIR: /app/web
      DCC_SERVER_PORT: "8095"
      DCC_DATABASE_HOST: postgres
      DCC_DATABASE_PORT: "5432"
      DCC_DATABASE_USER: devops
      DCC_DATABASE_PASSWORD: devops_secret
      DCC_DATABASE_NAME: devops_command_center
      DCC_REDIS_HOST: redis
      DCC_REDIS_PORT: "6379"
      DCC_JWT_ACCESS_SECRET: change-me-access-secret-min-32-chars!!
      DCC_JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-chars!
      DCC_JENKINS_DEMO_MODE: "true"
      DCC_GITHUB_DEMO_MODE: "false"
      # GitHub username/token come from env_file (../.env) — do not override with empty defaults
      DCC_JENKINS_URL: ${DCC_JENKINS_URL:-}
      DCC_JENKINS_USERNAME: ${DCC_JENKINS_USERNAME:-}
      DCC_JENKINS_TOKEN: ${DCC_JENKINS_TOKEN:-}
      DCC_DOCKER_ENABLED: "true"
      DCC_DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      # Expose the host Docker engine to the Operations Console (Docker Desktop / Linux).
      - /var/run/docker.sock:/var/run/docker.sock
    # UI is baked into the image (see Dockerfile.backend). Optional live mount:
    #   - ../frontend/dist:/app/web:ro
    group_add:
      # Docker Desktop often owns the socket as root; keep non-root appuser in that group.
      - "0"
    ports:
      - "8095:8095"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.frontend
    container_name: dcc-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  nginx:
    image: nginx:1.27-alpine
    container_name: dcc-nginx
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dcc-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    container_name: dcc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.2.1
    container_name: dcc-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

volumes:
  postgres_data:
  grafana_data:
